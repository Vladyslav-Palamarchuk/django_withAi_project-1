{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-lg-8 offset-lg-2">
            <div class="card shadow">
                <div class="card-body">
                    <h1 class="display-4">{{ product.title }}</h1>
                    <hr>
                    <p class="lead">{{ product.description }}</p>
                    <h3 class="text-success">{{ product.price }} грн</h3>
                    <p class="text-muted">Додано: {{ product.created_at|date:"d.m.Y" }}</p>
                    
                    <a href="{% url 'product-list' %}" class="btn btn-secondary">← Назад до списку</a>
                    <button class="btn btn-primary">Купити зараз</button>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
