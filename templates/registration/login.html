{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow p-4 mt-5">
            <h2 class="text-center mb-4">Вхід у систему</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100">Увійти</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
